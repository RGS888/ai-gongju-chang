<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - AI工具场</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 30px 20px;
            color: white;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .contact-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .contact-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        
        @media (max-width: 600px) {
            .contact-cards {
                grid-template-columns: 1fr;
            }
        }
        
        .contact-card {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .contact-card .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        
        .contact-card.wechat .icon {
            background: linear-gradient(135deg, #07c160, #06ad56);
        }
        
        .contact-card.mp .icon {
            background: linear-gradient(135deg, #1677ff, #0958d9);
        }
        
        .contact-card h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .contact-card p {
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .qrcode-wrapper {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .qrcode-wrapper img {
            width: 100%;
            max-width: 200px;
            height: auto;
            border-radius: 8px;
        }
        
        .scan-tip {
            font-size: 12px;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .back-btn {
            display: block;
            width: 200px;
            margin: 30px auto 0;
            padding: 14px 30px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        
        .back-btn:hover {
            transform: scale(1.05);
        }
        
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255,255,255,0.8);
            font-size: 12px;
        }
        
        .footer a {
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📞 联系我们</h1>
        <p>有任何问题或建议，欢迎添加微信咨询</p>
    </div>
    
    <div class="contact-container">
        <div class="contact-cards">
            <!-- 客服微信 -->
            <div class="contact-card wechat">
                <div class="icon">💬</div>
                <h2>客服微信</h2>
                <p>扫码添加客服微信<br>获取更多帮助和支持</p>
                <div class="qrcode-wrapper">
                    <img src="assets/微信二维码.jpg" alt="客服微信二维码">
                </div>
                <div class="scan-tip">
                    👆 长按识别二维码
                </div>
            </div>
            
            <!-- 微信公众号 -->
            <div class="contact-card mp">
                <div class="icon">🔔</div>
                <h2>微信公众号</h2>
                <p>扫码关注公众号<br>获取最新资讯和活动</p>
                <div class="qrcode-wrapper">
                    <img src="assets/微信公众号二维码.jpg" alt="微信公众号二维码">
                </div>
                <div class="scan-tip">
                    👆 长按识别二维码
                </div>
            </div>
        </div>
        
        <a href="index.html" class="back-btn">← 返回首页</a>
    </div>
    
    <div class="footer">
        <p>© 2026 AI工具场 | <a href="https://aitoolchang.cn">aitoolchang.cn</a></p>
    </div>
</body>
</html>
