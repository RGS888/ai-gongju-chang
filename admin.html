<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教程管理后台 - AI工具场</title>
    <meta name="description" content="AI工具场管理后台，支持课程管理、会员管理、激活码管理、分销管理、收款设置、提现审核、积分管理等运营功能。">
    <meta name="robots" content="noindex, nofollow">
    <meta property="og:title" content="教程管理后台 - AI工具场">
    <meta property="og:type" content="website">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--gray-100);
            min-height: 100vh;
        }

        /* 登录页 */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .login-box h1 {
            font-size: 24px;
            color: var(--gray-800);
            margin-bottom: 8px;
            text-align: center;
        }

        .login-box p {
            color: var(--gray-500);
            text-align: center;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-700);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--gray-300);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            padding: 8px 16px;
            font-size: 14px;
            width: auto;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        /* 管理后台 */
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .admin-header {
            background: white;
            padding: 20px 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .admin-header h1 {
            font-size: 20px;
            color: var(--gray-800);
        }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: white;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: var(--gray-100);
            color: var(--gray-600);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .tab-btn:hover {
            background: var(--gray-200);
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* User Table */
        .user-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
        }
        .stat-card .label {
            font-size: 14px;
            color: var(--gray-500);
            margin-top: 4px;
        }
        .user-table {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .user-table table {
            width: 100%;
            border-collapse: collapse;
        }
        .user-table th, .user-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--gray-100);
        }
        .user-table th {
            background: var(--gray-50);
            font-weight: 600;
            font-size: 13px;
            color: var(--gray-600);
        }
        .user-table td {
            font-size: 14px;
            color: var(--gray-700);
        }
        .user-table tr:hover td {
            background: var(--gray-50);
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-new {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .search-box {
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
        }
        .search-box input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--gray-300);
            border-radius: 8px;
            font-size: 14px;
        }

        .admin-header .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .admin-header .logout-btn {
            padding: 8px 16px;
            background: var(--gray-100);
            color: var(--gray-600);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        /* 添加表单 */
        .add-form {
            background: white;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .add-form h2 {
            font-size: 18px;
            color: var(--gray-800);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--gray-300);
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }

        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-tips {
            font-size: 12px;
            color: var(--gray-400);
            margin-top: 4px;
        }

        /* 教程列表 */
        .courses-list {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .courses-list h2 {
            font-size: 18px;
            color: var(--gray-800);
            margin-bottom: 20px;
        }

        .course-item {
            display: flex;
            gap: 16px;
            padding: 16px;
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            margin-bottom: 12px;
            transition: all 0.3s;
        }

        .course-item:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.1);
        }

        .course-item img {
            width: 160px;
            height: 90px;
            object-fit: cover;
            border-radius: 8px;
            background: var(--gray-100);
        }

        .course-info {
            flex: 1;
        }

        .course-info h3 {
            font-size: 16px;
            color: var(--gray-800);
            margin-bottom: 8px;
        }

        .course-info .category {
            display: inline-block;
            padding: 4px 10px;
            background: var(--primary);
            color: white;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .course-info p {
            font-size: 14px;
            color: var(--gray-500);
            margin-bottom: 8px;
        }

        .course-info .link {
            font-size: 12px;
            color: var(--primary);
            word-break: break-all;
        }

        .course-actions {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-400);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        /* 提示 */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
        }

        /* 隐藏 */
        .hidden {
            display: none !important;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .course-item {
                flex-direction: column;
            }
            .course-item img {
                width: 100%;
                height: 180px;
            }
            .course-actions {
                flex-direction: row;
            }
            body{padding:12px}
            .section{margin-bottom:16px}
            .tabs{display:flex;flex-wrap:wrap;gap:8px}
            .tab-btn{padding:10px 16px;font-size:13px;flex:1;min-width:120px}
            table{font-size:11px;overflow-x:auto;display:block}
            .course-list td,.course-list th{padding:8px 6px;white-space:nowrap}
            .course-list{width:100%;min-width:600px}
            .admin-header{flex-direction:column;gap:12px;padding:12px}
            .admin-header h1{font-size:18px}
            .user-info{flex-wrap:wrap}
            .logout-btn{padding:8px 12px;font-size:12px}
            .form-row{flex-direction:column}
            .form-group input,.form-group textarea,.form-group select{font-size:16px}
            .modal-content{width:95%;padding:16px}
            .stats-grid{grid-template-columns:repeat(2,1fr)!important}
            .payment-methods{flex-direction:column}
        }
        @media (max-width: 480px) {
            .tab-nav{overflow-x:auto;flex-wrap:nowrap;padding-bottom:8px}
            .tab-btn{padding:8px 12px;font-size:12px;flex:0 0 auto}
            .stats-card{ padding: 12px; }
            .stats-card .value{font-size:20px}
            .search-bar{flex-direction:column}
            .search-bar input{width:100%}
            .btn{padding:12px;font-size:14px}
        }
    </style>
</head>
<body>
    <!-- 登录页 -->
    <div id="loginPage" class="login-container">
        <div class="login-box">
            <h1>🔐 教程管理后台</h1>
            <p>请输入管理密码登录</p>
            <div id="loginAlert" class="alert hidden"></div>
            <div class="form-group">
                <label>管理员账号</label>
                <input type="text" id="usernameInput" placeholder="请输入管理员账号" onkeypress="handleEnter(event)">
            </div>
            <div class="form-group">
                <label>管理员密码</label>
                <input type="password" id="passwordInput" placeholder="请输入管理员密码" onkeypress="handleEnter(event)">
            </div>
            <button class="btn btn-primary" onclick="handleLogin()">登录</button>
        </div>
    </div>

    <!-- 管理后台 -->
    <div id="adminPage" class="admin-container hidden">
        <div class="admin-header">
            <h1>📚 AI工具场 管理后台</h1>
            <div class="user-info">
                <span style="color: #6b7280; font-size: 14px;">已登录</span>
                <button class="logout-btn" onclick="handleLogout()">退出登录</button>
                <button class="logout-btn" onclick="showChangePassword()">修改密码</button>
            </div>
        </div>

        <!-- Tab导航 -->
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('course')">📚 教程管理</button>
            <button class="tab-btn" onclick="switchTab('user')">👥 用户管理</button>
            <button class="tab-btn" onclick="switchTab('codes')">🔑 激活码管理</button>
            <button class="tab-btn" onclick="switchTab('distribution')">💰 分销管理</button>
            <button class="tab-btn" onclick="switchTab('payment')">💳 收款与提现</button>
            <button class="tab-btn" onclick="switchTab('points')">💎 积分管理</button>
            <button class="tab-btn" onclick="switchTab('analytics')">📊 数据分析</button>
        </div>

        <!-- 教程管理Tab -->
        <div id="tab-course" class="tab-content active">

        <!-- 添加教程表单 -->
        <div class="add-form">
            <h2>➕ 添加新教程</h2>
            <div id="formAlert" class="alert hidden"></div>
            <div class="form-row">
                <div class="form-group">
                    <label>教程标题 *</label>
                    <input type="text" id="courseTitle" placeholder="例如：扣子AI从入门到精通">
                </div>
                <div class="form-group">
                    <label>分类 *</label>
                    <select id="courseCategory" style="width: 100%; padding: 12px 16px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px;">
                        <option value="AI工具">🤖 AI工具</option>
                        <option value="视频制作">🎬 视频制作</option>
                        <option value="运营技巧">📊 运营技巧</option>
                        <option value="图文创作">📝 图文创作</option>
                        <option value="变现技巧">💰 变现技巧</option>
                        <option value="其他">📚 其他</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>教程简介 *</label>
                <textarea id="courseDesc" placeholder="简要描述教程内容（50-100字）"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>B站视频链接 *</label>
                    <input type="url" id="courseLink" placeholder="https://www.bilibili.com/video/BV1xxx/">
                    <p class="form-tips">将视频上传到B站，复制视频链接粘贴到这里</p>
                </div>
                <div class="form-group">
                    <label>封面图片链接</label>
                    <input type="url" id="courseCover" placeholder="https://i.imgur.com/xxx.jpg">
                    <p class="form-tips">可留空自动使用默认封面，或上传到图床获取链接</p>
                </div>
            </div>
            <div class="form-group">
                <label>标签（用逗号分隔）</label>
                <input type="text" id="courseTags" placeholder="例如：扣子,AI工具,入门教程">
            </div>
            <button class="btn btn-primary" onclick="addCourse()" style="margin-top: 16px;">
                ✅ 添加教程
            </button>
        </div>

        <!-- 教程列表 -->
        <div class="courses-list">
            <h2>📋 已上传教程（共 <span id="courseCount">0</span> 个）</h2>
            <div id="coursesContainer">
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <p>暂无教程，请添加第一个教程</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 修改密码弹窗 -->
    <div id="passwordModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: white; padding: 30px; border-radius: 12px; width: 400px; max-width: 90%;">
            <h3 style="margin-bottom: 20px;">🔑 修改管理密码</h3>
            <div class="form-group">
                <label>新密码</label>
                <input type="password" id="newPassword" placeholder="请输入新密码">
            </div>
            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" id="confirmPassword" placeholder="请再次输入新密码">
            </div>
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="btn btn-primary" onclick="changePassword()" style="flex: 1;">确认修改</button>
                <button class="btn" onclick="closePasswordModal()" style="flex: 1; background: #e5e7eb; color: #374151;">取消</button>
            </div>
        </div>
    </div>

    <script>
        // 配置文件
        const CONFIG = {
            dataFile: 'courses.json',
            defaultCover: 'https://img.freepik.com/free-vector/video-tutorial-icon_12668-719.jpg',
            defaultPassword: 'Jd123321' // 默认密码
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 设置默认密码（如果未设置过）
            if (!localStorage.getItem('adminPassword')) {
                localStorage.setItem('adminPassword', CONFIG.defaultPassword);
            }
            checkLogin();
            loadCourses();
        });

        // ===== USER MANAGEMENT - Ensure admin user =====
        (function initAdminUser() {
            const USER_DB_KEY = 'ai_gongju_chang_users';
            let users = JSON.parse(localStorage.getItem(USER_DB_KEY) || '[]');
            if (!users.find(u => u.username === 'admin')) {
                users.push({
                    username: 'admin',
                    password: 'Jd123321',
                    wechat: 'admin',
                    phone: 'admin',
                    registerTime: '2026-01-01T00:00:00.000Z'
                });
                localStorage.setItem(USER_DB_KEY, JSON.stringify(users));
            }
        })();

        // 检查登录状态
        function checkLogin() {
            const isLoggedIn = localStorage.getItem('adminLoggedIn');
            if (isLoggedIn === 'true') {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('adminPage').classList.remove('hidden');
            }
        }

        // 回车登录
        function handleEnter(e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        }

        // 登录
        function handleLogin() {
            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const savedPassword = localStorage.getItem('adminPassword') || 'Jd123321';
            
            if (!username) {
                showAlert('loginAlert', '请输入管理员账号！', 'error');
                return;
            }
            if (!password) {
                showAlert('loginAlert', '请输入管理员密码！', 'error');
                return;
            }
            if (username !== 'admin') {
                showAlert('loginAlert', '管理员账号错误！', 'error');
                return;
            }
            if (password !== savedPassword) {
                showAlert('loginAlert', '密码错误，请重试！', 'error');
                return;
            }
            localStorage.setItem('adminLoggedIn', 'true');
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('adminPage').classList.remove('hidden');
            document.getElementById('loginAlert').classList.add('hidden');
        }

        // 退出登录
        function handleLogout() {
            localStorage.removeItem('adminLoggedIn');
            document.getElementById('adminPage').classList.add('hidden');
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('usernameInput').value = '';
            document.getElementById('passwordInput').value = '';
        }

        // 显示修改密码弹窗
        function showChangePassword() {
            document.getElementById('passwordModal').style.display = 'flex';
        }

        // 关闭修改密码弹窗
        function closePasswordModal() {
            document.getElementById('passwordModal').style.display = 'none';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        }

        // 修改密码
        function changePassword() {
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            
            if (!newPass) {
                alert('请输入新密码');
                return;
            }
            if (newPass !== confirmPass) {
                alert('两次密码输入不一致');
                return;
            }
            if (newPass.length < 6) {
                alert('密码长度至少6位');
                return;
            }
            
            localStorage.setItem('adminPassword', newPass);
            alert('密码修改成功！');
            closePasswordModal();
        }

        // 显示提示
        function showAlert(elementId, message, type) {
            const alert = document.getElementById(elementId);
            alert.textContent = message;
            alert.className = 'alert alert-' + type;
            alert.classList.remove('hidden');
            
            // 错误提示停留更长时间
            const duration = type === 'error' ? 5000 : 3000;
            setTimeout(() => {
                alert.classList.add('hidden');
            }, duration);
        }

        // 加载教程列表
        async function loadCourses() {
            try {
                const response = await fetch(CONFIG.dataFile);
                if (response.ok) {
                    const data = await response.json();
                    renderCourses(data.courses || []);
                } else {
                    renderCourses([]);
                }
            } catch (e) {
                // 文件不存在，使用空列表
                renderCourses([]);
            }
        }

        // 渲染教程列表
        function renderCourses(courses) {
            const container = document.getElementById('coursesContainer');
            document.getElementById('courseCount').textContent = courses.length;
            
            if (courses.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>暂无教程，请添加第一个教程</p>
                    </div>
                `;
                return;
            }
            
            // 按时间倒序
            courses.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            container.innerHTML = courses.map(course => `
                <div class="course-item">

        // 添加教程
        async function addCourse() {
            const title = document.getElementById('courseTitle').value.trim();
            const category = document.getElementById('courseCategory').value;
            const description = document.getElementById('courseDesc').value.trim();
            const bilibili = document.getElementById('courseLink').value.trim();
            const cover = document.getElementById('courseCover').value.trim();
            const tagsStr = document.getElementById('courseTags').value.trim();
            
            // 验证
            if (!title) {
                showAlert('formAlert', '请输入教程标题！', 'error');
                return;
            }
            if (!description) {
                showAlert('formAlert', '请输入教程简介！', 'error');
                return;
            }
            if (!bilibili || !bilibili.includes('bilibili.com')) {
                showAlert('formAlert', '请输入正确的B站视频链接！', 'error');
                return;
            }
            
            // 解析标签
            const tags = tagsStr ? tagsStr.split(/[,，]/).map(t => t.trim()).filter(t => t) : [];
            
            // 生成ID
            const id = Date.now().toString();
            
            // 新教程对象
            const newCourse = {
                id: id,
                title: title,
                category: category,
                cover: cover || CONFIG.defaultCover,
                bilibili: bilibili,
                description: description,
                tags: tags,
                date: new Date().toISOString().split('T')[0]
            };
            
            // 读取现有数据
            let courses = [];
            try {
                const response = await fetch(CONFIG.dataFile);
                if (response.ok) {
                    const data = await response.json();
                    courses = data.courses || [];
                }
            } catch (e) {
                courses = [];
            }
            
            // 添加新教程
            courses.unshift(newCourse);
            
            // 保存到文件（通过下载方式）
            downloadJSON({
                courses: courses
            });
            
            // 清空表单
            document.getElementById('courseTitle').value = '';
            document.getElementById('courseDesc').value = '';
            document.getElementById('courseLink').value = '';
            document.getElementById('courseCover').value = '';
            document.getElementById('courseTags').value = '';
            
            showAlert('formAlert', '✅ 教程信息已生成！请下载下方JSON文件，并上传到网站根目录替换 courses.json', 'success');
            
            // 刷新列表
            renderCourses(courses);
        }

        // 下载JSON文件
        function downloadJSON(data) {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'courses.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

                    planId: planId,

                    days: plan.days,

            });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });

            filtered.sort((a, b) => b.applyTime - a.applyTime);

        function getMethodBgColor(method) {
            const colors = { wechat: '#dcfce7', alipay: '#fef3c7', bank: '#e0e7ff' };

        }
        
        function getMethodColor(method) {
            const colors = { wechat: '#166534', alipay: '#92400e', bank: '#4338ca' };
            return colors[method] || '#374151';
        }
        
        function getMethodIcon(method) {
            const icons = { wechat: '💚', alipay: '💙', bank: '🏦' };
            return icons[method] || '💳';
        }
        
        function getMethodName(method) {
            const names = { wechat: '微信', alipay: '支付宝', bank: '银行卡' };
            return names[method] || method;
        }
        
        function getStatusBgColor(status) {
            const colors = { pending: '#fef3c7', approved: '#dcfce7', rejected: '#fee2e2' };
            return colors[status] || '#f3f4f6';
        }
        
        function getStatusColor(status) {
            const colors = { pending: '#92400e', approved: '#166534', rejected: '#991b1b' };
            return colors[status] || '#374151';
        }

            const icons = { pending: '⏳', approved: '✅', rejected: '❌' };
            return icons[status] || '📋';
        }

            const names = { pending: '待处理', approved: '已打款', rejected: '已拒绝' };
            return names[status] || status;

        // 批准提现申请
        function approveWithdrawal(id) {
            if (!confirm('确认要批准此提现申请吗？\n\n请先确认已向用户转账，再点击确认。')) return;
            
            const withdrawals = getWithdrawals();
            const index = withdrawals.findIndex(w => w.id === id);
            if (index !== -1) {
                withdrawals[index].status = 'approved';
                withdrawals[index].processTime = Date.now();
                saveWithdrawals(withdrawals);
                alert('✅ 已标记为已打款！');
                renderWithdrawalsList();
            }
        }
        
        // 拒绝提现申请
        function rejectWithdrawal(id) {
            const reason = prompt('请输入拒绝原因（选填）：');
            
            const withdrawals = getWithdrawals();
            const index = withdrawals.findIndex(w => w.id === id);
            if (index !== -1) {
                withdrawals[index].status = 'rejected';
                withdrawals[index].processTime = Date.now();
                withdrawals[index].rejectReason = reason || '未说明原因';
                
                // 退还佣金给用户
                const distDb = getDistDb();
                const username = withdrawals[index].username;
                const amount = withdrawals[index].amount;
                if (distDb.users[username]) {
                    // 从可提现金额中扣除已拒绝的金额
                    distDb.users[username].withdrawn = Math.max(0, (distDb.users[username].withdrawn || 0) - amount);
                }
                saveDistDb(distDb);
                
                saveWithdrawals(withdrawals);
                alert('❌ 已拒绝提现申请！');
                renderWithdrawalsList();
            }
        }

                                <label>充值100元赠送</label>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <input type="number" id="gift100" value="2000" style="width: 100px; padding: 12px 16px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px;">
                                    <span>积分</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <button class="btn btn-primary" onclick="savePointsConfig()" style="width: auto; padding: 12px 32px;">
                        💾 保存配置
                    </button>
                </div>
                
                <!-- 用户积分列表 -->
                <div class="add-form">
                    <h2>👥 用户积分管理</h2>
                    <div class="search-box">
                        <input type="text" id="pointsSearch" placeholder="搜索用户名..." oninput="renderPointsList(this.value)">
                    </div>
                    <div id="pointsList"></div>
                </div>
            `;
            
            // 加载配置
            loadPointsConfig();
            renderPointsList();
        }
        
        // 加载积分配置
        function loadPointsConfig() {
            const config = JSON.parse(localStorage.getItem('ai_gongju_chang_points_config') || '{}');
            if (config.rate) document.getElementById('pointsRate').value = config.rate;
            if (config.minRecharge) document.getElementById('minRecharge').value = config.minRecharge;
            if (config.gift30) document.getElementById('gift30').value = config.gift30;
            if (config.gift50) document.getElementById('gift50').value = config.gift50;
            if (config.gift100) document.getElementById('gift100').value = config.gift100;
        }
        
        // 保存积分配置
        function savePointsConfig() {
            const config = {
                rate: parseInt(document.getElementById('pointsRate').value) || 100,
                minRecharge: parseInt(document.getElementById('minRecharge').value) || 10,
                gift30: parseInt(document.getElementById('gift30').value) || 200,
                gift50: parseInt(document.getElementById('gift50').value) || 500,
                gift100: parseInt(document.getElementById('gift100').value) || 2000
            };
            localStorage.setItem('ai_gongju_chang_points_config', JSON.stringify(config));
            showAlert('pointsAlert', '✅ 积分配置已保存！', 'success');
        }
        
        // 渲染用户积分列表
        function renderPointsList(searchTerm = '') {
            const users = getAllUsers();
            let usersList = Object.entries(users).map(([username, data]) => ({
                username,
                ...data
            }));
            
            // 过滤
            if (searchTerm) {
                usersList = usersList.filter(u => 
                    u.username.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }
            
            // 按积分排序
            usersList.sort((a, b) => (b.points || 0) - (a.points || 0));
            
            const container = document.getElementById('pointsList');
            if (!container) return;
            
            if (usersList.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">💎</div>
                        <p>暂无用户数据</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <div class="user-table">
                    <table>
                        <thead>
                            <tr>
                                <th>用户名</th>
                                <th>积分余额</th>
                                <th>充值总额</th>
                                <th>充值次数</th>
                                <th>注册时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${usersList.map(u => {
                                const totalRecharge = (u.rechargeHistory || []).reduce((s, r) => s + r.amount, 0);
                                return `
                                    <tr>
                                        <td><strong>${u.username}</strong></td>
                                        <td style="color: #6366f1; font-weight: bold; font-size: 16px;">${(u.points || 0).toLocaleString()}</td>
                                        <td style="color: #22c55e; font-weight: bold;">¥${totalRecharge.toFixed(2)}</td>
                                        <td>${(u.rechargeHistory || []).length}次</td>
                                        <td style="font-size: 12px; color: #666;">${new Date(u.registerTime || Date.now()).toLocaleDateString()}</td>
                                        <td>
                                            <button onclick="adjustUserPoints('${u.username}')" style="background: #6366f1; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-right: 4px;">✏️ 调整</button>
                                        </td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        
        // 调整用户积分
        function adjustUserPoints(username) {
            const users = getAllUsers();
            const user = users[username];
            if (!user) return;
            
            const action = prompt(`请选择操作：\n1. 增加积分\n2. 减少积分\n\n输入数字：`);
            if (!action) return;
            
            const amount = parseInt(prompt('请输入积分数量：'));
            if (isNaN(amount) || amount <= 0) {
                alert('请输入有效的积分数量！');
                return;
            }
            
            if (action === '1') {
                user.points = (user.points || 0) + amount;
            } else if (action === '2') {
                user.points = Math.max(0, (user.points || 0) - amount);
            }
            
            // 记录操作
            if (!user.pointsHistory) user.pointsHistory = [];
            user.pointsHistory.push({
                type: action === '1' ? 'admin_add' : 'admin_sub',
                amount: amount,
                admin: 'admin',
                time: Date.now()
            });
            
            localStorage.setItem(POINTS_DB_KEY, JSON.stringify(users));
            alert(`✅ 已${action === '1' ? '增加' : '减少'}用户 ${username} ${amount} 积分`);
            renderPointsList(document.getElementById('pointsSearch')?.value || '');
        }

        // ===== 数据分析系统 =====
        function renderAnalyticsTab() {
            // 获取所有数据
            const users = getUsers();
            const codesData = getCodesData();
            const distDb = getDistDb();
            const paymentDb = getPaymentDb();
            const pointsDb = getPointsDb();
            
            // 计算各类统计数据
            const totalUsers = users.length;
            const vipUsers = users.filter(u => u.isVip).length;
            const today = new Date();
            const todayStr = today.toDateString();
            
            // 用户增长趋势（近7天）
            const last7Days = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                const dateStr = d.toDateString();
                const count = users.filter(u => new Date(u.registerTime).toDateString() === dateStr).length;
                last7Days.push({ date: d.toLocaleDateString('zh-CN', {month:'numeric', day:'numeric'}), count });
            }
            const todayUsers = last7Days[6].count;
            
            // 激活码统计
            const totalCodes = Object.values(codesData).flat().length;
            const usedCodes = Object.values(codesData).flat().filter(c => c.used).length;
            const unusedCodes = totalCodes - usedCodes;
            
            // 收入统计
            const totalRecharge = users.reduce((sum, u) => {
                return sum + (u.rechargeHistory || []).reduce((s, r) => s + r.amount, 0);
            }, 0);
            
            // 分销统计
            const distUsers = Object.keys(distDb.users).length;
            const totalCommission = Object.values(distDb.users).reduce((sum, u) => {
                return sum + (u.level1Commission || 0) + (u.level2Commission || 0);
            }, 0);
            const pendingWithdrawals = (distDb.withdrawals || []).filter(w => w.status === 'pending').length;
            
            // 工具分类统计（静态数据）
            const toolStats = [
                { name: 'AI对话', count: 25, color: '#4f46e5' },
                { name: 'AI图像', count: 10, color: '#7c3aed' },
                { name: 'AI视频', count: 30, color: '#db2777' },
                { name: 'AI音乐', count: 20, color: '#0891b2' },
                { name: 'AI办公', count: 25, color: '#1d4ed8' },
                { name: 'AI编程', count: 20, color: '#065f46' },
                { name: 'AI智能体', count: 20, color: '#c2410c' },
                { name: 'AI写作', count: 26, color: '#4d7c0f' },
                { name: 'AI设计', count: 20, color: '#9f1239' },
                { name: 'AI企业', count: 20, color: '#1e3a5f' },
                { name: 'AI电商', count: 15, color: '#b45309' },
                { name: 'AI学习教育', count: 15, color: '#0369a1' },
                { name: 'AI趣味工具', count: 15, color: '#d97706' },
                { name: '直播工具', count: 4, color: '#991b1b' }
            ];
            const totalTools = toolStats.reduce((sum, t) => sum + t.count, 0);
            
            // 渲染Tab内容
            let analyticsTab = document.getElementById('tab-analytics');
            if (!analyticsTab) {
                analyticsTab = document.createElement('div');
                analyticsTab.id = 'tab-analytics';
                analyticsTab.className = 'tab-content';
                document.getElementById('adminPage').appendChild(analyticsTab);
            }
            
            analyticsTab.innerHTML = `
                <!-- 核心指标卡片 -->
                <div class="user-stats" style="margin-bottom:24px">
                    <div class="stat-card" style="border-left:4px solid #4f46e5">
                        <div class="value" style="color:#4f46e5">${totalUsers}</div>
                        <div class="label">总用户数</div>
                    </div>
                    <div class="stat-card" style="border-left:4px solid #22c55e">
                        <div class="value" style="color:#22c55e">${todayUsers}</div>
                        <div class="label">今日新增</div>
                    </div>
                    <div class="stat-card" style="border-left:4px solid #f59e0b">
                        <div class="value" style="color:#f59e0b">${vipUsers}</div>
                        <div class="label">VIP会员</div>
                    </div>
                    <div class="stat-card" style="border-left:4px solid #ef4444">
                        <div class="value" style="color:#ef4444">¥${totalRecharge}</div>
                        <div class="label">总收入</div>
                    </div>
                </div>

                <!-- 用户增长趋势 -->
                <div class="add-form" style="margin-bottom:24px">
                    <h2>📈 用户增长趋势（近7天）</h2>
                    <div style="display:flex;align-items:flex-end;gap:8px;height:120px;padding:10px 0">
                        ${last7Days.map((d, i) => {
                            const max = Math.max(...last7Days.map(x => x.count), 1);
                            const height = (d.count / max * 80) + 20;
                            return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
                                <span style="font-size:12px;color:#666">${d.count}</span>
                                <div style="width:100%;height:${height}px;background:linear-gradient(to top,#6366f1,#818cf8);border-radius:4px 4px 0 0;transition:height 0.3s"></div>
                                <span style="font-size:11px;color:#999">${d.date}</span>
                            </div>`;
                        }).join('')}
                    </div>
                </div>

                <!-- 双列统计 -->
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px">
                    <!-- 激活码统计 -->
                    <div class="add-form">
                        <h2>🔑 激活码统计</h2>
                        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;text-align:center">
                            <div>
                                <div style="font-size:28px;font-weight:700;color:#6366f1">${totalCodes}</div>
                                <div style="font-size:13px;color:#999">总生成</div>
                            </div>
                            <div>
                                <div style="font-size:28px;font-weight:700;color:#22c55e">${usedCodes}</div>
                                <div style="font-size:13px;color:#999">已使用</div>
                            </div>
                            <div>
                                <div style="font-size:28px;font-weight:700;color:#f59e0b">${unusedCodes}</div>
                                <div style="font-size:13px;color:#999">未使用</div>
                            </div>
                        </div>
                        <div style="margin-top:16px;background:#f3f4f6;border-radius:8px;padding:12px">
                            <div style="display:flex;justify-content:space-between;margin-bottom:8px">
                                <span style="color:#666">使用率</span>
                                <span style="font-weight:600;color:#22c55e">${totalCodes > 0 ? Math.round(usedCodes/totalCodes*100) : 0}%</span>
                            </div>
                            <div style="height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden">
                                <div style="height:100%;width:${totalCodes > 0 ? usedCodes/totalCodes*100 : 0}%;background:linear-gradient(90deg,#22c55e,#4ade80);transition:width 0.3s"></div>
                            </div>
                        </div>
                    </div>

                    <!-- 分销统计 -->
                    <div class="add-form">
                        <h2>💰 分销统计</h2>
                        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;text-align:center">
                            <div>
                                <div style="font-size:28px;font-weight:700;color:#6366f1">${distUsers}</div>
                                <div style="font-size:13px;color:#999">分销用户</div>
                            </div>
                            <div>
                                <div style="font-size:28px;font-weight:700;color:#22c55e">¥${totalCommission.toFixed(2)}</div>
                                <div style="font-size:13px;color:#999">佣金总额</div>
                            </div>
                            <div>
                                <div style="font-size:28px;font-weight:700;color:#f59e0b">${pendingWithdrawals}</div>
                                <div style="font-size:13px;color:#999">待审核提现</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 工具分类统计 -->
                <div class="add-form">
                    <h2>🛠️ 工具分类分布（${totalTools}个工具）</h2>
                    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px">
                        ${toolStats.map(t => {
                            const percentage = (t.count / totalTools * 100).toFixed(1);
                            return `<div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:#f9fafb;border-radius:8px">
                                <div style="width:8px;height:8px;border-radius:50%;background:${t.color}"></div>
                                <span style="flex:1;font-size:14px;color:#374151">${t.name}</span>
                                <span style="font-weight:600;color:${t.color}">${t.count}</span>
                                <span style="font-size:12px;color:#9ca3af">${percentage}%</span>
                            </div>`;
                        }).join('')}
                    </div>
                </div>

                <!-- 数据更新时间 -->
                <div style="text-align:center;padding:20px;color:#9ca3af;font-size:13px">
                    📊 数据更新时间：${new Date().toLocaleString('zh-CN')}
                </div>
            `;
        }

        // 辅助函数：获取支付数据库
        function getPaymentDb() {
            const data = localStorage.getItem('ai_gongju_chang_payment');
            return data ? JSON.parse(data) : { withdrawals: [] };
        }
        
        // 辅助函数：获取积分数据库
        function getPointsDb() {
            const data = localStorage.getItem('ai_gongju_chang_points');
            return data ? JSON.parse(data) : {};
        }
        </div><!-- End tab-course -->
    </script>
