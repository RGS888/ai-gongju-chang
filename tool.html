    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
        a{color:inherit;text-decoration:none}
        
        /* Header */
        .header{background:rgba(15,17,23,0.95);border-bottom:1px solid rgba(99,102,241,0.2);position:fixed;top:0;left:0;right:0;height:60px;z-index:1000;backdrop-filter:blur(20px);display:flex;align-items:center;padding:0 24px}
        .header-logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:800;color:#fff}
        .header-logo .icon{font-size:26px;background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header-back{display:flex;align-items:center;gap:8px;margin-left:auto;color:rgba(255,255,255,0.7);font-size:14px;cursor:pointer;transition:color 0.2s}
        .header-back:hover{color:#a78bfa}
        
        /* Main */
        .main{padding-top:80px;max-width:900px;margin:0 auto;padding:80px 24px 48px}
        
        /* Tool Header */
        .tool-header{background:#161b27;border:1px solid rgba(99,102,241,0.15);border-radius:20px;padding:32px;margin-bottom:24px;position:relative;overflow:hidden}
        .tool-header::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--cat-color,#6366f1),var(--cat-color-end,#a855f7))}
        .tool-header-inner{display:flex;gap:24px;align-items:flex-start}
        .tool-icon{width:80px;height:80px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0;background:linear-gradient(135deg,var(--cat-color,#6366f1),var(--cat-color-end,#a855f7))}
        .tool-info{flex:1}
        .tool-name{font-size:28px;font-weight:800;color:#fff;margin-bottom:8px}
        .tool-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
        .tool-tag{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500}
        .tool-tag.hot{background:rgba(239,68,68,0.15);color:#fca5a5;border:1px solid rgba(239,68,68,0.2)}
        .tool-tag.free{background:rgba(34,197,94,0.12);color:#86efac;border:1px solid rgba(34,197,94,0.2)}
        .tool-tag.new{background:rgba(59,130,246,0.12);color:#93c5fd;border:1px solid rgba(59,130,246,0.2)}
        .tool-tag.fee{background:rgba(251,191,36,0.12);color:#fde68a;border:1px solid rgba(251,191,36,0.2)}
        .tool-category-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);border-radius:20px;font-size:13px;color:#a78bfa}
        .tool-category-badge i{margin-right:4px}
        
        /* Action Button */
        .tool-actions{position:absolute;top:32px;right:32px}
        .go-btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:linear-gradient(135deg,#6366f1,#7c3aed);color:#fff;border:none;border-radius:30px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.3s;box-shadow:0 4px 20px rgba(99,102,241,0.4);text-decoration:none}
        .go-btn:hover{transform:scale(1.05);box-shadow:0 6px 30px rgba(99,102,241,0.6)}
        .go-btn i{font-size:14px}
        
        /* Section */
        .section{background:#161b27;border:1px solid rgba(99,102,241,0.15);border-radius:20px;padding:28px;margin-bottom:24px}
        .section-title{display:flex;align-items:center;gap:12px;font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:20px}
        .section-title i{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--cat-color,#6366f1),var(--cat-color-end,#a855f7));color:#fff;font-size:16px}
        
        /* Description */
        .desc-text{font-size:16px;line-height:1.8;color:#cbd5e1}
        
        /* Features */
        .features-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
        .feature-item{display:flex;align-items:flex-start;gap:12px;padding:16px;background:rgba(255,255,255,0.03);border-radius:12px;border:1px solid rgba(255,255,255,0.06)}
        .feature-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--cat-color,#6366f1),var(--cat-color-end,#a855f7));color:#fff;flex-shrink:0;font-size:16px}
        .feature-text{font-size:14px;color:#94a3b8;line-height:1.5}
        .feature-text strong{display:block;color:#e2e8f0;margin-bottom:4px}
        
        /* Pricing */
        .pricing-info{display:flex;gap:16px;flex-wrap:wrap}
        .price-item{flex:1;min-width:150px;padding:20px;background:rgba(255,255,255,0.03);border-radius:12px;border:1px solid rgba(255,255,255,0.06);text-align:center}
        .price-label{font-size:13px;color:#64748b;margin-bottom:8px}
        .price-value{font-size:24px;font-weight:800;color:#22c55e}
        .price-item.paid .price-value{color:#f59e0b}
        .price-note{font-size:12px;color:#475569;margin-top:6px}
        
        /* Usage */
        .usage-list{list-style:none}
        .usage-item{display:flex;align-items:flex-start;gap:12px;padding:16px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
        .usage-item:last-child{border-bottom:none}
        .usage-num{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--cat-color,#6366f1),var(--cat-color-end,#a855f7));color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .usage-text{font-size:14px;color:#94a3b8;line-height:1.6}
        
        /* Tips */
        .tips-list{list-style:none}
        .tip-item{display:flex;align-items:flex-start;gap:10px;padding:12px 0}
        .tip-icon{color:#fbbf24;font-size:16px;flex-shrink:0;margin-top:2px}
        .tip-text{font-size:14px;color:#94a3b8;line-height:1.6}
        
        /* Loading */
        .loading{text-align:center;padding:80px 0;color:#64748b}
        .loading i{font-size:48px;margin-bottom:16px;animation:spin 1s linear infinite}
        @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
        
        /* Not Found */
        .not-found{text-align:center;padding:80px 0;color:#64748b}
        .not-found i{font-size:64px;margin-bottom:16px;color:#ef4444}
        .not-found h2{font-size:24px;color:#e2e8f0;margin-bottom:8px}
        
        /* Responsive */
        @media(max-width:768px){
            .tool-header-inner{flex-direction:column;align-items:center;text-align:center}
            .tool-actions{position:static;margin-top:20px}
            .go-btn{width:100%;justify-content:center}
            .tool-name{font-size:24px}
        }
