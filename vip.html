            { id: 8, title: '📋 小红书运营实战笔记', category: 'doc', desc: '完整运营SOP流程文档', views: 8960, biliUrl: 'https://www.bilibili.com/video/BV2xxx', tag: '精华' },
            { id: 9, title: '🛠️ AI剪辑神器VIP版', category: 'tool', desc: '一键自动剪辑工具，提高效率10倍', views: 15670, biliUrl: 'https://www.bilibili.com/video/BV3xxx', tag: '工具' },
            { id: 10, title: '📊 数据分析工具合集', category: 'tool', desc: '运营必备数据分析工具', views: 6540, biliUrl: 'https://www.bilibili.com/video/BV8xxx', tag: '工具' },
            { id: 11, title: '📑 PPT模板素材包', category: 'template', desc: '500+精美PPT模板，随意使用', views: 11230, biliUrl: 'https://www.bilibili.com/video/BV5xxx', tag: '素材' },
            { id: 12, title: '🎨 视频封面模板库', category: 'template', desc: '200+爆款封面PSD源文件', views: 9870, biliUrl: 'https://www.bilibili.com/video/BV6xxx', tag: '素材' },
        ];
        
        let currentCategory = 'all';
        let selectedPricing = 'month'; // 默认月套餐
        let currentPaymentMaterial = null; // 当前支付单个资料
        let selectedPaymentMethod = 'alipay';
        
        // 获取已购买的资料ID列表
        function getOwnedMaterials() {
            const owned = localStorage.getItem('ownedMaterials');
            return owned ? JSON.parse(owned) : [];
        }
        
        // 获取会员信息
        function getMemberInfo() {
            const memberData = localStorage.getItem('memberInfo');
            if (memberData) {
                const member = JSON.parse(memberData);
                const now = Date.now();
                if (member.expireTime && now < member.expireTime) {
                    return member;
                }
            }
            return null;
        }
        
        // 检查是否有月卡
        function hasMonthCard() {
            return getMemberInfo() !== null;
        }
        
        // 更新UI状态
        function updateUI() {
            const owned = getOwnedMaterials();
            const member = getMemberInfo();
            const pricingSection = document.getElementById('pricingSection');
            const memberCard = document.getElementById('memberCard');
            
            if (member) {
                // 月卡会员 - 隐藏套餐选择
                pricingSection.style.display = 'none';
                memberCard.style.display = 'block';
                document.getElementById('memberLevel').textContent = getLevelName(member.level);
                document.getElementById('memberExpire').textContent = '有效期至：' + new Date(member.expireTime).toLocaleDateString();
            } else {
                pricingSection.style.display = 'block';
                memberCard.style.display = 'none';
            }
            
            renderMaterials();
        }
        
        function getLevelName(level) {
            const names = { 'month': '月卡会员', 'quarter': '季卡会员', 'year': '年卡会员', 'forever': '永久会员' };
            return names[level] || '会员';
        }
        
        // 选择套餐
        function selectPricing(type) {
            selectedPricing = type;
            document.getElementById('singleCard').classList.toggle('recommended', type === 'single');
            document.getElementById('monthCard').classList.toggle('recommended', type === 'month');
            
            if (type === 'month') {
                // 直接跳转激活码页面购买月卡
                location.href = 'activate.html';
            }
        }
        
        // 渲染资料列表
        function renderMaterials() {
            const list = document.getElementById('materialsList');
            let filtered = materials;
            
            if (currentCategory !== 'all') {
                filtered = materials.filter(m => m.category === currentCategory);
            }
            
            const owned = getOwnedMaterials();
            const hasMonth = hasMonthCard();
            const isUnlocked = hasMonth; // 月卡用户解锁全部
            
            list.innerHTML = filtered.map(m => {
                const isOwned = owned.includes(m.id) || isUnlocked;
                const iconClass = m.category === 'video' ? 'video' : m.category === 'tool' ? 'tool' : m.category === 'doc' ? 'doc' : 'template';
                const iconEmoji = m.category === 'video' ? '📹' : m.category === 'tool' ? '💻' : m.category === 'doc' ? '📄' : '📋';
                
                return `
                    <div class="material-card">
                        <div class="material-icon ${iconClass}">${iconEmoji}</div>
                        <div class="material-info">
                            <div class="material-title">${m.title}</div>
                            <div class="material-desc">${m.desc}</div>
                            <div class="material-meta">👁️ ${m.views}次浏览 ${m.tag ? '· <span style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;">' + m.tag + '</span>' : ''}</div>
                        </div>
                        <div class="material-action">
                            ${isOwned ? 
                                `<div class="material-price owned">${isUnlocked ? '👑 已解锁' : '<span class="owned-badge">已购买</span>'}</div>
                                 <button class="btn-view" onclick="openMaterial(${m.id})">▶️</button>` :
                                `<div class="material-price">¥${SINGLE_PRICE}</div>
                                 <button class="btn-buy" onclick="buyMaterial(${m.id})">购买</button>`
                            }
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // 分类切换
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.category;
                renderMaterials();
            });
        });
        
        // 购买单个资料
        function buyMaterial(id) {
            currentPaymentMaterial = id;
            const material = materials.find(m => m.id === id);
            if (material) {
                document.getElementById('paymentTitle').textContent = '💳 解锁：' + material.title.substring(4);
                document.getElementById('modalAmount').textContent = SINGLE_PRICE;
                document.getElementById('paymentForm').style.display = 'block';
                document.getElementById('paymentSuccess').classList.remove('show');
                document.getElementById('paymentModal').classList.add('active');
            }
        }
        
        // 打开资料
        function openMaterial(id) {
            const material = materials.find(m => m.id === id);
            if (material) {
                window.location.href = material.biliUrl;
            }
        }
        
        // 选择支付方式
        function selectPaymentMethod(method) {
            selectedPaymentMethod = method;
            document.getElementById('alipayBtn').classList.toggle('active', method === 'alipay');
            document.getElementById('wechatBtn').classList.toggle('active', method === 'wechat');
            document.getElementById('qrcodeMethod').textContent = method === 'alipay' ? '支付宝' : '微信支付';
        }
        
        // 确认支付
        function confirmPayment() {
            // 标记资料已购买
            if (currentPaymentMaterial) {
                const owned = getOwnedMaterials();
                if (!owned.includes(currentPaymentMaterial)) {
                    owned.push(currentPaymentMaterial);
                    localStorage.setItem('ownedMaterials', JSON.stringify(owned));
                }
            }
            
            // 显示成功
            document.getElementById('paymentForm').style.display = 'none';
            document.getElementById('paymentSuccess').classList.add('show');
            document.getElementById('successMsg').textContent = '资料已解锁，可直接观看';
        }
        
        // 关闭支付弹窗
        function closePaymentModal() {
            document.getElementById('paymentModal').classList.remove('active');
            currentPaymentMaterial = null;
        }
        
        // 点击外部关闭
        document.getElementById('paymentModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closePaymentModal();
            }
        });
        
        // 初始化
        updateUI();
        
        // 默认选中月卡
        selectPricing('month');
        
        // 定期更新
        setInterval(updateUI, 3000);
    </script>
</body>
</html>
